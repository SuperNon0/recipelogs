# ============================================================
# nginx.conf — RecipeLog reverse proxy
# Cloudflare Zero Trust gère le TLS externe,
# nginx écoute en HTTP local (port 80).
# ============================================================

server {
    listen 80;
    server_name recipe.super-nono.cc;

    # Logs
    access_log /var/log/nginx/recipelog.access.log;
    error_log  /var/log/nginx/recipelog.error.log;

    # Taille max upload (pour futures fonctionnalités)
    client_max_body_size 10M;

    # Assets statiques Next.js (cache agressif)
    location /_next/static/ {
        alias /opt/recipelog/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Fichiers publics
    location /public/ {
        alias /opt/recipelog/public/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Application Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Gzip
        gzip              on;
        gzip_comp_level   5;
        gzip_types        text/plain text/css application/json application/javascript;
    }
}
